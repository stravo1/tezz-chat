<svg width="100%" viewBox="0 0 680 680" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Tezz Chat logo mark</title>
  <desc>
    Minimal logomark for Tezz Chat: a rounded square tile with a stylised Signal Coral
    lightning-bolt slash made of two stacked parallelogram bars.
  </desc>

  <style>
    .tile {
      fill: #f1e6e3;
    }

    .bolt {
      fill: #ff6f67;
    }

    @media (prefers-color-scheme: dark) {
      .tile {
        fill: #201918;
      }

      .bolt {
        fill: #ff7770;
      }
    }
  </style>

  <rect class="tile" x="140" y="140" width="400" height="400" rx="88"/>
  <polygon class="bolt" points="255,220 385,220 355,290 225,290"/>
  <polygon class="bolt" points="295,320 425,320 395,460 265,460"/>
</svg>
